name: Lint PR
on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

jobs:
  main:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Configure which types are allowed.
          # Default is feat, fix, chore, docs, style, refactor, perf, test
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            perf
            test
          # Configure that a scope must be always uppercase (optional)
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternErrorMsg: |
            The subject (description) of the PR title must not start with an uppercase letter.
            Example: "feat: add sound" (Correct)
            Example: "feat: Add sound" (Incorrect)
