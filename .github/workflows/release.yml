name: Release
on:
  push:
    branches:
      - main

jobs:
  release:
    name: Build and Release
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm install

      - name: Build Mac App
        run: npm run build:mac -- --publish never
        env:
          # This tells electron-builder to just package, not upload
          # (semantic-release will handle the upload)
          CSC_IDENTITY_AUTO_DISCOVERY: false 

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # If you publish to NPM, add NPM_TOKEN here
        run: npx semantic-release
